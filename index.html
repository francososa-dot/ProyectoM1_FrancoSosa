<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generador de Paletas</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🎨 Generador de Paletas 🖌️</h1>

<div class="controls">
    <label class="paletteSize">Formato de color:</label>
<select id="colorFormat">
    <option value="hex">HEX</option>
    <option value="hsl">HSL</option>
</select>
</div>

<div class="control-group">
<label>Tamaño de paleta:</label>
<select id="paletteSize">
<option value="6">6 colores</option>
<option value="8">8 colores</option>
<option value="9">9 colores</option>
</select>

<button id="generateBtn">Generar Paleta</button>
</div>

<div id="paletteContainer"></div>

<footer>
    <p>© <span id="year"></span> Generador de Paletas | <a href="https://francososa-dot.github.io/Porftfolio-Franco/" class="github">Franco Sosa</a></p>
</footer>

<script src="script.js"></script>

</body>
</html>
